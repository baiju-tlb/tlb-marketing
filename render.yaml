services:
  - type: web
    name: tlb-marketing
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/auth/me
    disk:
      name: tlb-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/marketing.db
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_PROJECT
        sync: false
      - key: LINKEDIN_COMPANY_ID
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_REDIRECT_URI
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
