<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TLB Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['DM Sans', 'sans-serif'] },
          colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
        }
      }
    }
  </script>
  <style>
    .otp-input { letter-spacing: 12px; font-size: 24px; text-align: center; font-weight: 700; }
    .otp-input::placeholder { letter-spacing: 4px; font-size: 14px; font-weight: 400; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 2px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="https://www.thelandbankers.com/assets/images/tlb-logo.png" alt="TLB" class="h-12 mx-auto mb-3">
      <p class="text-xs text-gray-400 tracking-wide uppercase">Marketing Hub</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <!-- Step 1: Email -->
      <div id="step-email">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Welcome back</h2>
        <p class="text-sm text-gray-500 mb-6">Enter your email to receive a login code</p>

        <div class="mb-4">
          <label class="block text-sm text-gray-500 mb-1.5">Email address</label>
          <input type="email" id="login-email" placeholder="you@thelandbankers.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            onkeydown="if(event.key==='Enter')sendOTP()">
        </div>

        <div id="email-error" class="text-xs text-red-500 mb-3 hidden"></div>

        <button onclick="sendOTP()" id="btn-send-otp"
          class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 transition flex items-center justify-center gap-2">
          Send Login Code
        </button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step-otp" class="hidden fade-in">
        <h2 class="text-xl font-bold text-gray-800 mb-1">Enter code</h2>
        <p class="text-sm text-gray-500 mb-1">We sent a 6-digit code to</p>
        <p class="text-sm font-medium text-gray-700 mb-6" id="otp-email-display"></p>

        <div class="mb-4">
          <input type="text" id="login-otp" maxlength="6" inputmode="numeric" pattern="[0-9]*"
            class="otp-input w-full border border-gray-200 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
            placeholder="------"
            onkeydown="if(event.key==='Enter')verifyOTP()" oninput="this.value=this.value.replace(/\D/g,'')">
        </div>

        <div id="otp-error" class="text-xs text-red-500 mb-3 hidden"></div>

        <button onclick="verifyOTP()" id="btn-verify-otp"
          class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 transition flex items-center justify-center gap-2">
          Verify & Login
        </button>

        <div class="flex items-center justify-between mt-4">
          <button onclick="backToEmail()" class="text-xs text-gray-400 hover:text-gray-600 transition">Change email</button>
          <button onclick="resendOTP()" id="btn-resend" class="text-xs text-brand-600 hover:text-brand-700 font-medium transition">Resend code</button>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Only authorized team members can access this dashboard.</p>
  </div>

  <script>
    let loginEmail = '';

    // Check if already logged in
    fetch('/api/auth/me').then(r => r.json()).then(data => {
      if (data.authenticated) window.location.href = '/';
    });

    async function sendOTP() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      if (!email) return showError('email-error', 'Please enter your email');

      const btn = document.getElementById('btn-send-otp');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Sending...';

      try {
        const res = await fetch('/api/auth/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) {
          showError('email-error', data.error);
          return;
        }

        loginEmail = email;
        document.getElementById('otp-email-display').textContent = email;
        document.getElementById('step-email').classList.add('hidden');
        document.getElementById('step-otp').classList.remove('hidden');
        document.getElementById('login-otp').focus();
        startResendTimer();
      } catch (err) {
        showError('email-error', 'Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Send Login Code';
      }
    }

    async function verifyOTP() {
      const otp = document.getElementById('login-otp').value.trim();
      if (otp.length !== 6) return showError('otp-error', 'Please enter the 6-digit code');

      const btn = document.getElementById('btn-verify-otp');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verifying...';

      try {
        const res = await fetch('/api/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginEmail, otp })
        });
        const data = await res.json();

        if (!res.ok) {
          showError('otp-error', data.error);
          return;
        }

        window.location.href = '/';
      } catch (err) {
        showError('otp-error', 'Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Verify & Login';
      }
    }

    async function resendOTP() {
      document.getElementById('login-otp').value = '';
      hideError('otp-error');
      await sendOTPSilent();
      startResendTimer();
    }

    async function sendOTPSilent() {
      try {
        await fetch('/api/auth/send-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginEmail })
        });
      } catch {}
    }

    function startResendTimer() {
      const btn = document.getElementById('btn-resend');
      let seconds = 30;
      btn.disabled = true;
      btn.classList.add('opacity-50');
      const interval = setInterval(() => {
        seconds--;
        btn.textContent = `Resend in ${seconds}s`;
        if (seconds <= 0) {
          clearInterval(interval);
          btn.textContent = 'Resend code';
          btn.disabled = false;
          btn.classList.remove('opacity-50');
        }
      }, 1000);
    }

    function backToEmail() {
      document.getElementById('step-otp').classList.add('hidden');
      document.getElementById('step-email').classList.remove('hidden');
      document.getElementById('login-otp').value = '';
      hideError('otp-error');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError(id) {
      document.getElementById(id).classList.add('hidden');
    }
  </script>
</body>
</html>
