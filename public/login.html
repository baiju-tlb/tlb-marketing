<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TLB Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['DM Sans', 'sans-serif'] },
          colors: { brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } }
        }
      }
    }
  </script>
  <style>
    .spinner { border: 2px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="https://www.thelandbankers.com/assets/images/tlb-logo.png" alt="TLB" class="h-12 mx-auto mb-3">
      <p class="text-xs text-gray-400 tracking-wide uppercase">Marketing Hub</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-1">Welcome back</h2>
      <p class="text-sm text-gray-500 mb-6">Sign in to your account</p>

      <div class="mb-4">
        <label class="block text-sm text-gray-500 mb-1.5">Email address</label>
        <input type="email" id="login-email" placeholder="you@thelandbankers.com"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition">
      </div>

      <div class="mb-4">
        <label class="block text-sm text-gray-500 mb-1.5">Password</label>
        <input type="password" id="login-password" placeholder="Enter password"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
          onkeydown="if(event.key==='Enter')login()">
      </div>

      <div id="login-error" class="text-xs text-red-500 mb-3 hidden"></div>

      <button onclick="login()" id="btn-login"
        class="w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-brand-700 transition flex items-center justify-center gap-2">
        Sign In
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Only authorized team members can access this dashboard.</p>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => r.json()).then(data => {
      if (data.authenticated) window.location.href = '/';
    });

    async function login() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;

      if (!email) return showError('Please enter your email');
      if (!password) return showError('Please enter your password');

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      hideError();

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error);
          return;
        }

        window.location.href = '/';
      } catch (err) {
        showError('Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('login-error').classList.add('hidden');
    }
  </script>
</body>
</html>
